<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Abstandsrechner · Rob 1 / Rob 2</title>
<style>
  :root{
    --bg:#0a0b0d;
    --card:#141619;
    --card-border:#232629;
    --text:#e9e7e2;
    --text-dim:#8b8e93;
    --text-faint:#57595d;
    --accent-line:#2a2d31;

    --plus4:#0f5636;
    --plus3:#156b46;
    --plus2:#1f8f5c;
    --plus1:#3e9575;
    --zero:#4a4d55;
    --minus1:#b8695c;
    --minus2:#d14a30;
    --minus3:#a8341f;

    --mono: 'SF Mono', 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
    --grot: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--grot);
    height:100%;
    overscroll-behavior-y: contain;
  }

  body{
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: 18px 10px 28px;
  }

  header.top{
    padding: 6px 6px 16px;
    text-align:center;
  }
  header.top h1{
    font-size: 19px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .row{
    display:flex;
    flex-direction: row;
    gap: 8px;
    align-items: stretch;
  }

  .robot-card{
    flex: 1 1 50%;
    min-width: 0;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 12px 10px 14px;
    display:flex;
    flex-direction: column;
  }

  .robot-head{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 2px 4px 10px;
    border-bottom: 1px solid var(--accent-line);
    margin-bottom: 10px;
  }
  .robot-head h2{
    margin:0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .robot-head .count{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .robot-head .count b{
    color: var(--text);
    font-weight: 600;
  }

  .btn-stack{
    display:flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }

  .val-btn{
    appearance:none;
    border:none;
    border-radius: 12px;
    padding: 7px 6px;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: #f3f2ef;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    letter-spacing: 0.02em;
    transition: transform 0.08s ease, filter 0.08s ease;
  }
  .val-btn:active{
    transform: scale(0.96);
    filter: brightness(1.15);
  }
  .val-btn.p4{ background: var(--plus4); }
  .val-btn.p3{ background: var(--plus3); }
  .val-btn.p2{ background: var(--plus2); }
  .val-btn.p1{ background: var(--plus1); }
  .val-btn.z0{ background: var(--zero); color: var(--text-dim); }
  .val-btn.m1{ background: var(--minus1); }
  .val-btn.m2{ background: var(--minus2); }
  .val-btn.m3{ background: var(--minus3); }

  .table-wrap{
    border: 1px solid var(--accent-line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
    max-height: 168px;
    overflow-y: auto;
    background: #101215;
  }
  table{
    width:100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead th{
    position: sticky;
    top:0;
    background:#191b1f;
    color: var(--text-faint);
    font-weight: 600;
    text-align:left;
    padding: 6px 8px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent-line);
  }
  thead th:last-child, tbody td:last-child{ text-align:right; }
  tbody td{
    padding: 5px 8px;
    color: var(--text);
    border-bottom: 1px solid #1b1d21;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:last-child{ background: #171a1e; }
  .empty-row td{
    color: var(--text-faint);
    text-align:center;
    padding: 14px 8px;
    font-style: normal;
  }
  .val-pos{ color: #6fbf94; }
  .val-neg{ color: #e08072; }
  .val-zero{ color: var(--text-dim); }

  .stats{
    display:flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .stat-line{
    display:flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    padding: 7px 10px;
    border-radius: 10px;
    background: #101215;
    border: 1px solid var(--accent-line);
  }
  .stat-line .label{
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .stat-line .value{
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 700;
    white-space: nowrap;
  }
  .stat-line.offset{
    background: #12181a;
    border-color: #253a35;
  }
  .stat-line.offset .label{ color: #7fb8a8; }

  .undo-row{
    margin-bottom: 10px;
  }
  .undo-row .act-btn{
    margin: 0;
  }

  .actions{
    display:flex;
    flex-direction: column;
    gap: 6px;
    margin-top: auto;
  }
  .act-btn{
    appearance:none;
    border: 1px solid var(--accent-line);
    background: #17191d;
    color: var(--text-dim);
    border-radius: 10px;
    padding: 9px 6px;
    font-family: var(--grot);
    font-size: 12px;
    font-weight: 600;
    width: 100%;
    transition: transform 0.08s ease, background 0.08s ease;
  }
  .act-btn:active{ transform: scale(0.97); background:#1d2024; }
  .act-btn.danger{ color: #d98277; }

  footer.note{
    text-align:center;
    padding: 18px 14px 4px;
    font-family: var(--grot);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.01em;
    line-height: 1.4;
  }

  .info-figure{
    margin: 10px 0 0;
    padding: 0;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    overflow: hidden;
  }
  .info-figure img{
    display:block;
    width: 100%;
    height: auto;
  }

  @media (min-width: 480px){
    .val-btn{ font-size: 17px; padding: 9px 6px; }
    header.top h1{ font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <h1>Arbeitsabstandrechner</h1>
  </header>

  <div class="row">
    <!-- ROB 2 (links) -->
    <section class="robot-card" data-robot="rob2">
      <div class="robot-head">
        <h2>Rob 2</h2>
        <div class="count">Einträge: <b data-count>0</b></div>
      </div>

      <div class="btn-stack">
        <button class="val-btn p4" data-val="4">+4</button>
        <button class="val-btn p3" data-val="3">+3</button>
        <button class="val-btn p2" data-val="2">+2</button>
        <button class="val-btn p1" data-val="1">+1</button>
        <button class="val-btn z0" data-val="0">0</button>
        <button class="val-btn m1" data-val="-1">-1</button>
        <button class="val-btn m2" data-val="-2">-2</button>
        <button class="val-btn m3" data-val="-3">-3</button>
      </div>

      <div class="undo-row">
        <button class="act-btn" data-undo>Letzten Eintrag löschen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Eintrag</th><th>Wert [mm]</th></tr></thead>
          <tbody data-table>
            <tr class="empty-row"><td colspan="2">Noch keine Messwerte</td></tr>
          </tbody>
        </table>
      </div>

      <div class="stats">
        <div class="stat-line">
          <span class="label">Mittelwert</span>
          <span class="value" data-mean>– mm</span>
        </div>
        <div class="stat-line offset">
          <span class="label">Offset-Anpassung</span>
          <span class="value" data-offset>– mm</span>
        </div>
      </div>

      <div class="actions">
        <button class="act-btn danger" data-reset>Zurücksetzen</button>
      </div>
    </section>

    <!-- ROB 1 (rechts) -->
    <section class="robot-card" data-robot="rob1">
      <div class="robot-head">
        <h2>Rob 1</h2>
        <div class="count">Einträge: <b data-count>0</b></div>
      </div>

      <div class="btn-stack">
        <button class="val-btn p4" data-val="4">+4</button>
        <button class="val-btn p3" data-val="3">+3</button>
        <button class="val-btn p2" data-val="2">+2</button>
        <button class="val-btn p1" data-val="1">+1</button>
        <button class="val-btn z0" data-val="0">0</button>
        <button class="val-btn m1" data-val="-1">-1</button>
        <button class="val-btn m2" data-val="-2">-2</button>
        <button class="val-btn m3" data-val="-3">-3</button>
      </div>

      <div class="undo-row">
        <button class="act-btn" data-undo>Letzten Eintrag löschen</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Eintrag</th><th>Wert [mm]</th></tr></thead>
          <tbody data-table>
            <tr class="empty-row"><td colspan="2">Noch keine Messwerte</td></tr>
          </tbody>
        </table>
      </div>

      <div class="stats">
        <div class="stat-line">
          <span class="label">Mittelwert</span>
          <span class="value" data-mean>– mm</span>
        </div>
        <div class="stat-line offset">
          <span class="label">Offset-Anpassung</span>
          <span class="value" data-offset>– mm</span>
        </div>
      </div>

      <div class="actions">
        <button class="act-btn danger" data-reset>Zurücksetzen</button>
      </div>
    </section>
  </div>

  <figure class="info-figure">
    <img src="treppeninfo.png" alt="Erklärung des Messverfahrens (Treppenmethode)" loading="lazy">
  </figure>

  <footer class="note">Arbeitsabstandrechner für Projekt Athena des Fraunhofer IWS</footer>
</div>

<script>
(function(){
  "use strict";

  const state = {
    rob1: [],
    rob2: []
  };

  function fmt(n){
    // format mm value with sign, trim trailing zeros but keep up to 2 decimals
    if (n === 0) return "0";
    const rounded = Math.round(n * 100) / 100;
    const sign = rounded > 0 ? "+" : "";
    return sign + rounded.toString().replace(".", ",");
  }

  function fmtRaw(n){
    const sign = n > 0 ? "+" : "";
    return sign + n;
  }

  function valueClass(n){
    if (n > 0) return "val-pos";
    if (n < 0) return "val-neg";
    return "val-zero";
  }

  function render(robotKey){
    const card = document.querySelector('.robot-card[data-robot="' + robotKey + '"]');
    const arr = state[robotKey];

    // count
    card.querySelector('[data-count]').textContent = arr.length;

    // table
    const tbody = card.querySelector('[data-table]');
    tbody.innerHTML = "";
    if (arr.length === 0) {
      const tr = document.createElement("tr");
      tr.className = "empty-row";
      tr.innerHTML = '<td colspan="2">Noch keine Messwerte</td>';
      tbody.appendChild(tr);
    } else {
      arr.forEach(function(v, i){
        const tr = document.createElement("tr");
        const tdIdx = document.createElement("td");
        tdIdx.textContent = i + 1;
        const tdVal = document.createElement("td");
        tdVal.textContent = fmtRaw(v);
        tdVal.className = valueClass(v);
        tr.appendChild(tdIdx);
        tr.appendChild(tdVal);
        tbody.appendChild(tr);
      });
      // scroll table to bottom so newest entry is visible
      const wrap = card.querySelector(".table-wrap");
      wrap.scrollTop = wrap.scrollHeight;
    }

    // mean + offset
    const meanEl = card.querySelector('[data-mean]');
    const offsetEl = card.querySelector('[data-offset]');
    if (arr.length === 0) {
      meanEl.textContent = "– mm";
      offsetEl.textContent = "– mm";
    } else {
      const sum = arr.reduce(function(a, b){ return a + b; }, 0);
      const mean = sum / arr.length;
      const offset = -mean;
      meanEl.textContent = fmt(mean) + " mm";
      offsetEl.textContent = fmt(offset) + " mm";
    }
  }

  function attachRobot(robotKey){
    const card = document.querySelector('.robot-card[data-robot="' + robotKey + '"]');

    card.querySelectorAll(".val-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        const v = parseInt(btn.getAttribute("data-val"), 10);
        state[robotKey].push(v);
        render(robotKey);
      });
    });

    card.querySelector("[data-undo]").addEventListener("click", function(){
      state[robotKey].pop();
      render(robotKey);
    });

    card.querySelector("[data-reset]").addEventListener("click", function(){
      if (state[robotKey].length === 0) return;
      state[robotKey] = [];
      render(robotKey);
    });

    render(robotKey);
  }

  attachRobot("rob1");
  attachRobot("rob2");
})();
</script>
</body>
</html>
